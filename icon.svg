<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1120"/>
      <stop offset="100%" stop-color="#161b2e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b7cfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="orbGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b7cfa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="2" y="2" width="508" height="508" rx="106" fill="none" stroke="#5b7cfa" stroke-opacity="0.15" stroke-width="2"/>

  <!-- Ambient orb glow behind the mark -->
  <circle cx="256" cy="240" r="160" fill="url(#orbGlow)" filter="url(#innerGlow)"/>

  <!-- Central diamond / command mark -->
  <g filter="url(#softGlow)">
    <!-- Outer diamond frame -->
    <path d="M256 80 L400 224 L256 368 L112 224 Z" fill="none" stroke="url(#glow)" stroke-width="4" stroke-linejoin="round" stroke-opacity="0.6"/>

    <!-- Inner diamond (solid) -->
    <path d="M256 130 L365 224 L256 318 L147 224 Z" fill="url(#glow)" fill-opacity="0.12" stroke="url(#glow)" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Core bolt / pulse mark -->
    <path d="M240 172 L220 220 L250 220 L232 276" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.95"/>

    <!-- Right side decorative lines (circuit aesthetic) -->
    <line x1="300" y1="192" x2="340" y2="192" stroke="#5b7cfa" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.5"/>
    <circle cx="345" cy="192" r="3.5" fill="#5b7cfa" fill-opacity="0.6"/>
    <line x1="290" y1="250" x2="330" y2="250" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.4"/>
    <circle cx="335" cy="250" r="3.5" fill="#8b5cf6" fill-opacity="0.5"/>
  </g>

  <!-- "LIFE OS" text at bottom -->
  <text x="256" y="420" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="64" letter-spacing="8" fill="url(#glow)">LIFE OS</text>
  <text x="256" y="452" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="500" font-size="24" letter-spacing="6" fill="#5b7cfa" fill-opacity="0.5">COMMAND CENTRE</text>
</svg>
